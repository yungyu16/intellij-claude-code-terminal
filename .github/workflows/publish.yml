name: Publish Plugin

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      plugin-version:
        description: 'Plugin version (e.g. 1.2.3)'
        required: true
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # 创建 GitHub Release 需要写权限

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Derive version
        id: version
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            VERSION="${{ github.event.inputs.plugin-version }}"
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            echo "tag=v$VERSION"     >> "$GITHUB_OUTPUT"
          else
            TAG="${GITHUB_REF_NAME}"          # e.g. v1.2.3
            VERSION="${TAG#v}"                # strip leading 'v' → 1.2.3
            echo "tag=$TAG"       >> "$GITHUB_OUTPUT"
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          fi

      - name: Grant execute permission for Gradle wrapper
        run: chmod +x gradlew

      - name: Build plugin
        env:
          PLUGIN_VERSION: ${{ steps.version.outputs.version }}
        run: ./gradlew buildPlugin

      - name: Upload to JetBrains Marketplace
        if: github.event_name == 'push'
        env:
          JETBRAINS_TOKEN: ${{ secrets.JETBRAINS_TOKEN }}
        run: |
          PLUGIN_FILE=$(ls build/distributions/*.zip | head -1)
          echo "Uploading ${PLUGIN_FILE}..."
          curl --fail-with-body -i \
            -F "xmlId=io.github.yungyu16.claude-code-terminal-tab" \
            -F "file=@${PLUGIN_FILE}" \
            -H "Authorization: Bearer ${JETBRAINS_TOKEN}" \
            https://plugins.jetbrains.com/plugin/uploadPlugin

      - name: Create GitHub Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: v${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: build/distributions/*.zip
